name: Publish Package to npmjs
on:
  release:
    types: [created]
permissions:
  contents: read
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm run test
      - run: npm run build
      - run: npm publish --provenance
